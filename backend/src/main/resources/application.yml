server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/syntagma
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

storage:
  s3:
    enabled: ${STORAGE_S3_ENABLED:false}
    region: ${STORAGE_S3_REGION:nyc3}
    endpoint: ${STORAGE_S3_ENDPOINT:https://nyc3.digitaloceanspaces.com}
    bucket: ${STORAGE_S3_BUCKET:syntagma-dev}
    access-key: ${STORAGE_S3_ACCESS_KEY:}
    secret-key: ${STORAGE_S3_SECRET_KEY:}
    presign-expiration-minutes: ${STORAGE_S3_PRESIGN_EXPIRATION_MINUTES:10}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.springframework: INFO
    com.syntagma: DEBUG

ai:
  api:
    url: ${AI_API_URL:https://openrouter.ai/api/v1/chat/completions}
    key: ${AI_API_KEY:}
  model: ${AI_MODEL:google/gemini-3-flash-preview}
  word-explain:
    max-tokens: ${AI_WORD_EXPLAIN_MAX_TOKENS:500}
